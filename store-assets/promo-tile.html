<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=440">
<title>Mirror — Small Promo Tile 440×280</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 440px; height: 280px; overflow: hidden;
    background: #000;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
</style>
</head>
<body>

<div style="
  width: 440px; height: 280px;
  background: #020509;
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  justify-content: space-between;
  padding: 26px 30px 24px;
">

  <!-- Atmosphere blobs -->
  <div style="position:absolute;top:-80px;right:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(29,78,216,0.22) 0%,transparent 65%);pointer-events:none;z-index:0;"></div>
  <div style="position:absolute;bottom:-60px;left:-40px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(8,145,178,0.14) 0%,transparent 65%);pointer-events:none;z-index:0;"></div>
  <!-- Extra glow behind headline -->
  <div style="position:absolute;top:50%;left:50%;transform:translate(-60%,-50%);width:320px;height:200px;border-radius:50%;background:radial-gradient(ellipse,rgba(29,78,216,0.07) 0%,transparent 70%);pointer-events:none;z-index:0;"></div>

  <!-- ── TOP: Logo ───────────────────────────────────────── -->
  <div style="position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:8px;">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
        <defs><linearGradient id="lg" x1="0" y1="0" x2="32" y2="0" gradientUnits="userSpaceOnUse">
          <stop stop-color="#1d4ed8"/><stop offset="1" stop-color="#0891b2"/>
        </linearGradient></defs>
        <rect x="2"  y="12" width="4" height="4"  rx="2" fill="url(#lg)" opacity=".4"/>
        <rect x="8"  y="8"  width="4" height="8"  rx="2" fill="url(#lg)" opacity=".65"/>
        <rect x="14" y="4"  width="4" height="12" rx="2" fill="url(#lg)"/>
        <rect x="20" y="8"  width="4" height="8"  rx="2" fill="url(#lg)" opacity=".65"/>
        <rect x="26" y="12" width="4" height="4"  rx="2" fill="url(#lg)" opacity=".4"/>
        <line x1="0" y1="17.5" x2="32" y2="17.5" stroke="#1e2438" stroke-width="1"/>
        <rect x="2"  y="18" width="4" height="4"  rx="2" fill="url(#lg)" opacity=".18"/>
        <rect x="8"  y="18" width="4" height="8"  rx="2" fill="url(#lg)" opacity=".3"/>
        <rect x="14" y="18" width="4" height="12" rx="2" fill="url(#lg)" opacity=".38"/>
        <rect x="20" y="18" width="4" height="8"  rx="2" fill="url(#lg)" opacity=".3"/>
        <rect x="26" y="18" width="4" height="4"  rx="2" fill="url(#lg)" opacity=".18"/>
      </svg>
      <span style="font-size:17px;font-weight:700;letter-spacing:-0.3px;color:#f0eeff;">mirror<span style="color:#1d4ed8;">.</span></span>
    </div>
    <!-- For Google Meet badge -->
    <div style="display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:4px 10px;">
      <svg width="12" height="12" viewBox="0 0 48 48" fill="none">
        <rect x="4" y="14" width="26" height="20" rx="3" fill="#00832d" opacity="0.9"/>
        <path d="M30 20l12-6v20l-12-6V20z" fill="#00832d" opacity="0.9"/>
      </svg>
      <span style="font-size:10px;color:#8b89aa;font-weight:500;letter-spacing:0.1px;">For Google Meet</span>
    </div>
  </div>

  <!-- ── MIDDLE: Headline + decorative ─────────────────── -->
  <div style="position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:16px;">

    <!-- Left: headline block -->
    <div style="flex:0 0 auto;max-width:235px;">
      <div style="font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:#2a4070;margin-bottom:10px;">AI Voice Analysis</div>
      <div style="font-size:29px;font-weight:800;letter-spacing:-0.8px;line-height:1.15;color:#f0eeff;">
        Know how you<br>
        <span style="background:linear-gradient(135deg,#3b82f6 0%,#0891b2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">communicate.</span>
      </div>
      <div style="font-size:12px;color:#4a5070;margin-top:9px;line-height:1.5;font-weight:400;">
        Behavioral analysis from every call.
      </div>
    </div>

    <!-- Right: decorative score panel -->
    <div style="flex:0 0 auto;background:rgba(13,18,32,0.7);border:1px solid #1a2035;border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:10px;backdrop-filter:blur(8px);">

      <!-- Score row: Confidence -->
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:9.5px;color:#4a4d6a;width:62px;text-align:right;font-weight:500;">Confidence</span>
        <div style="display:flex;gap:3px;">
          <div style="width:13px;height:5px;border-radius:2px;background:#34d399;box-shadow:0 0 5px rgba(52,211,153,0.4);"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#34d399;box-shadow:0 0 5px rgba(52,211,153,0.4);"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#34d399;box-shadow:0 0 5px rgba(52,211,153,0.4);"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#34d399;box-shadow:0 0 5px rgba(52,211,153,0.4);"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#1e2438;"></div>
        </div>
      </div>

      <!-- Score row: Clarity -->
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:9.5px;color:#4a4d6a;width:62px;text-align:right;font-weight:500;">Clarity</span>
        <div style="display:flex;gap:3px;">
          <div style="width:13px;height:5px;border-radius:2px;background:#34d399;box-shadow:0 0 5px rgba(52,211,153,0.4);"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#34d399;box-shadow:0 0 5px rgba(52,211,153,0.4);"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#34d399;box-shadow:0 0 5px rgba(52,211,153,0.4);"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#34d399;box-shadow:0 0 5px rgba(52,211,153,0.4);"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#1e2438;"></div>
        </div>
      </div>

      <!-- Score row: Listening -->
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:9.5px;color:#4a4d6a;width:62px;text-align:right;font-weight:500;">Listening</span>
        <div style="display:flex;gap:3px;">
          <div style="width:13px;height:5px;border-radius:2px;background:#f59e0b;"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#f59e0b;"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#1e2438;"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#1e2438;"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#1e2438;"></div>
        </div>
      </div>

      <!-- Score row: Rapport -->
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:9.5px;color:#4a4d6a;width:62px;text-align:right;font-weight:500;">Rapport</span>
        <div style="display:flex;gap:3px;">
          <div style="width:13px;height:5px;border-radius:2px;background:#34d399;box-shadow:0 0 5px rgba(52,211,153,0.4);"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#34d399;box-shadow:0 0 5px rgba(52,211,153,0.4);"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#34d399;box-shadow:0 0 5px rgba(52,211,153,0.4);"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#1e2438;"></div>
          <div style="width:13px;height:5px;border-radius:2px;background:#1e2438;"></div>
        </div>
      </div>

      <!-- Divider + talk split -->
      <div style="border-top:1px solid #131827;padding-top:9px;">
        <div style="font-size:8.5px;color:#2a3050;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px;">Talk split</div>
        <div style="display:flex;height:5px;border-radius:3px;overflow:hidden;gap:1px;">
          <div style="width:54%;background:#3b82f6;border-radius:2px 0 0 2px;"></div>
          <div style="width:38%;background:#6d28d9;"></div>
          <div style="width:8%;background:#1e2438;border-radius:0 2px 2px 0;"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:5px;">
          <span style="font-size:9px;color:#5b9cf6;font-weight:600;">You 54%</span>
          <span style="font-size:9px;color:#8b5cf6;font-weight:500;">Others 38%</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── BOTTOM: Signal chips ───────────────────────────── -->
  <div style="position:relative;z-index:1;display:flex;gap:7px;align-items:center;">
    <div style="background:rgba(29,78,216,0.08);border:1px solid rgba(29,78,216,0.2);border-radius:20px;padding:4px 11px;font-size:10.5px;color:#5b9cf6;font-weight:500;">Talk ratio</div>
    <div style="background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.18);border-radius:20px;padding:4px 11px;font-size:10.5px;color:#34d399;font-weight:500;">Filler words</div>
    <div style="background:rgba(129,140,248,0.07);border:1px solid rgba(129,140,248,0.18);border-radius:20px;padding:4px 11px;font-size:10.5px;color:#818cf8;font-weight:500;">Speech rate</div>
    <div style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.18);border-radius:20px;padding:4px 11px;font-size:10.5px;color:#f59e0b;font-weight:500;">15+ signals</div>
  </div>

</div>
</body>
</html>
