<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mirror Icon Generator</title>
  <style>
    body {
      background: #0f1117;
      color: #f0eeff;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      gap: 32px;
    }
    h2 { margin: 0; font-size: 20px; letter-spacing: -0.3px; }
    p  { margin: 0; color: #6b6a88; font-size: 13px; }
    .previews {
      display: flex;
      align-items: flex-end;
      gap: 24px;
    }
    .preview {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #6b6a88;
    }
    canvas {
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    button {
      background: linear-gradient(135deg, #1d4ed8, #0891b2);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { opacity: 0.9; }
  </style>
</head>
<body>

<h2>Mirror: Voice Insights — Icon Generator</h2>
<p>Click the button to download all 3 icon sizes. Save them into <code>frontend/public/icons/</code></p>

<div class="previews" id="previews"></div>

<button onclick="downloadAll()">Download all icons</button>

<script>
  const SIZES = [16, 48, 128]

  function roundedRect(ctx, x, y, w, h, r) {
    ctx.beginPath()
    ctx.moveTo(x + r, y)
    ctx.lineTo(x + w - r, y)
    ctx.arcTo(x + w, y, x + w, y + r, r)
    ctx.lineTo(x + w, y + h - r)
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r)
    ctx.lineTo(x + r, y + h)
    ctx.arcTo(x, y + h, x, y + h - r, r)
    ctx.lineTo(x, y + r)
    ctx.arcTo(x, y, x + r, y, r)
    ctx.closePath()
  }

  // Mirror.'s "Dome / Clarity" mark — see docs/Mirror_Canonical_Vision.md and
  // frontend/src/components/Logo.jsx (the in-app source of truth this canvas
  // version is kept in sync with by hand, since it has no build-time access
  // to the React component). Dark rounded-square background, 7 individually
  // placed gray dashes tracing the ghost dome's arc (exact coordinates in a
  // 0-100 space, mirrored around the crown — matches Logo.jsx's DASH_COORDS
  // exactly, not approximated via a dash pattern), a mirror line with a real
  // gap on both sides, and a solid dome below glowing brighter at its center
  // and deepening toward its edges (radial gradient).
  const DASH_COORDS = [
    [24.30, 38.39, 26.45, 33.21],
    [29.17, 29.13, 33.13, 25.17],
    [37.21, 22.45, 42.39, 20.30],
    [47.20, 19.35, 52.80, 19.35],
    [57.61, 20.30, 62.79, 22.45],
    [66.87, 25.17, 70.83, 29.13],
    [73.55, 33.21, 75.70, 38.39],
  ]

  function drawIcon(size) {
    const canvas = document.createElement('canvas')
    canvas.width  = size
    canvas.height = size
    const ctx = canvas.getContext('2d')
    const s = size / 100 // scale factor: DASH_COORDS etc. are in 0-100 space

    // Rounded background — near-black, matches the app's own dark theme.
    const r = size * 0.22
    ctx.fillStyle = '#0f1117'
    roundedRect(ctx, 0, 0, size, size, r)
    ctx.fill()

    // 7 dashes tracing the ghost dome
    ctx.strokeStyle = '#5c6079'
    ctx.lineWidth = Math.max(1.2, size * 0.042)
    ctx.lineCap = 'round'
    DASH_COORDS.forEach(([x1, y1, x2, y2]) => {
      ctx.beginPath()
      ctx.moveTo(x1 * s, y1 * s)
      ctx.lineTo(x2 * s, y2 * s)
      ctx.stroke()
    })

    // Mirror line — gapped from both domes, not touching either
    ctx.strokeStyle = '#8b8ca3'
    ctx.lineWidth = Math.max(1, size * 0.032)
    ctx.beginPath()
    ctx.moveTo(10 * s, 50 * s)
    ctx.lineTo(90 * s, 50 * s)
    ctx.stroke()

    // Solid bottom dome — bright at center, deepening toward the edges
    const domeCx = 50 * s, domeCy = 54 * s, domeR = 27 * s
    const grad = ctx.createRadialGradient(domeCx, domeCy, 0, domeCx, domeCy, domeR)
    grad.addColorStop(0,    '#a5b4fc')
    grad.addColorStop(0.55, '#1d4ed8')
    grad.addColorStop(1,    '#1e3a8a')
    ctx.fillStyle = grad
    ctx.beginPath()
    ctx.arc(domeCx, domeCy, domeR, 0, Math.PI, false)
    ctx.fill()

    return canvas
  }

  // Render previews
  const container = document.getElementById('previews')
  SIZES.forEach(size => {
    const canvas = drawIcon(size)
    const displaySize = Math.max(size, 48)
    canvas.style.width  = displaySize + 'px'
    canvas.style.height = displaySize + 'px'
    canvas.style.imageRendering = size === 16 ? 'pixelated' : 'auto'

    const wrap = document.createElement('div')
    wrap.className = 'preview'
    wrap.appendChild(canvas)
    wrap.appendChild(Object.assign(document.createElement('span'), {
      textContent: `${size}×${size}`
    }))
    container.appendChild(wrap)
  })

  function downloadAll() {
    SIZES.forEach((size, i) => {
      setTimeout(() => {
        const canvas = drawIcon(size)
        const a = document.createElement('a')
        a.download = `icon${size}.png`
        a.href = canvas.toDataURL('image/png')
        a.click()
      }, i * 200)
    })
  }
</script>
</body>
</html>
